services:
  mongodb:
    image: mongo:8.0
    container_name: dessertrip-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27019}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-dessertrip}
    volumes:
      - dessertrip-mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin mongodb://127.0.0.1:27017/$$MONGO_INITDB_DATABASE --quiet --eval 'db.adminCommand({ ping: 1 }).ok'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  dessertrip-mongodb-data:
