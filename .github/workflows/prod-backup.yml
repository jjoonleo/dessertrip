name: prod-backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  prod-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
      AWS_DEFAULT_REGION: ${{ secrets.BACKUP_AWS_REGION }}
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
      BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
      BACKUP_MONGODB_URI: ${{ secrets.BACKUP_MONGODB_URI }}
      BACKUP_PREFIX: dessertrip/prod
      BACKUP_S3_ENDPOINT_URL: ${{ secrets.BACKUP_S3_ENDPOINT_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            BACKUP_MONGODB_URI
            BACKUP_BUCKET
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_DEFAULT_REGION
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing secret::$key is not set."
              exit 1
            fi
          done

      - name: Install MongoDB Database Tools
        run: ./scripts/install-mongodb-database-tools.sh

      - name: Create backup archive
        id: backup
        shell: bash
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          year="$(date -u +'%Y')"
          month="$(date -u +'%m')"
          day="$(date -u +'%d')"
          archive_path="$RUNNER_TEMP/backup-$timestamp.archive.gz"
          object_key="$BACKUP_PREFIX/$year/$month/$day/backup-$timestamp.archive.gz"

          mongodump --uri "$BACKUP_MONGODB_URI" --archive="$archive_path" --gzip

          {
            echo "archive_path=$archive_path"
            echo "object_key=$object_key"
          } >> "$GITHUB_OUTPUT"

      - name: Upload backup archive
        shell: bash
        run: |
          set -euo pipefail
          endpoint_args=()

          if [[ -n "${BACKUP_S3_ENDPOINT_URL:-}" ]]; then
            endpoint_args+=(--endpoint-url "$BACKUP_S3_ENDPOINT_URL")
          fi

          aws s3 cp \
            "${{ steps.backup.outputs.archive_path }}" \
            "s3://$BACKUP_BUCKET/${{ steps.backup.outputs.object_key }}" \
            "${endpoint_args[@]}" \
            --only-show-errors

      - name: Summarize backup
        shell: bash
        run: |
          {
            echo "### Production backup uploaded"
            echo
            echo "- Bucket: \`$BACKUP_BUCKET\`"
            echo "- Key: \`${{ steps.backup.outputs.object_key }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
